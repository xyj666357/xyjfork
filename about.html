<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - 杨徵泉的个人主页</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入字体图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f8fafc;
        }
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #3b82f6;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md py-4 px-6 md:px-12">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-blue-600">杨徵泉的个人主页</a>
            <div class="space-x-6">
                <a href="index.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium">首页</a>
                <a href="about.html" class="nav-link text-blue-600 font-medium">关于我</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="flex-grow px-6 py-12">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-8 border-b pb-4 border-gray-200">关于我</h1>
            
            <!-- 个人信息卡片 -->
            <div class="card bg-white rounded-xl shadow-md p-8 mb-8">
                <h2 class="text-2xl font-semibold text-gray-700 mb-6 flex items-center">
                    <i class="fa fa-id-card-o text-blue-600 mr-3"></i> 基本信息
                </h2>
                <ul class="space-y-4 text-lg text-gray-600">
                    <li class="flex items-start">
                        <span class="font-medium text-gray-800 w-24 inline-block">学号：</span>
                        <span>2025303120031</span>
                    </li>
                    <li class="flex items-start">
                        <span class="font-medium text-gray-800 w-24 inline-block">专业：</span>
                        <span>资源与环境</span>
                    </li>
                    <li class="flex items-start">
                        <span class="font-medium text-gray-800 w-24 inline-block">兴趣：</span>
                        <span>土壤侵蚀</span>
                    </li>
                </ul>
            </div>

            <!-- 技能卡片 -->
            <div class="card bg-white rounded-xl shadow-md p-8">
                <h2 class="text-2xl font-semibold text-gray-700 mb-6 flex items-center">
                    <i class="fa fa-code text-blue-600 mr-3"></i> 技能
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-50 rounded-lg p-4 text-center">
                        <i class="fa fa-r-square text-3xl text-blue-600 mb-2"></i>
                        <p class="text-lg font-medium text-gray-800">R 语言</p>
                    </div>
                    <div class="bg-blue-50 rounded-lg p-4 text-center">
                        <i class="fa fa-python text-3xl text-blue-600 mb-2"></i>
                        <p class="text-lg font-medium text-gray-800">Python</p>
                    </div>
                    <div class="bg-blue-50 rounded-lg p-4 text-center">
                        <i class="fa fa-file-text-o text-3xl text-blue-600 mb-2"></i>
                        <p class="text-lg font-medium text-gray-800">Quarto</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-6 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <p>&copy; 2026 杨徵泉的个人主页 | 资源与环境专业</p>
        </div>
    </footer>
</body>
</html>
