<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨徵泉的个人主页</title>
    <!-- 引入Tailwind CSS简化样式编写 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入字体图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        /* 自定义基础样式 */
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f8fafc;
        }
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #3b82f6;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md py-4 px-6 md:px-12">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold text-blue-600">杨徵泉的个人主页</a>
            <div class="space-x-6">
                <a href="index.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium">首页</a>
                <a href="about.html" class="nav-link text-gray-700 hover:text-blue-600 font-medium">关于我</a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="text-center max-w-3xl">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-6">杨徵泉的个人主页</h1>
            <p class="text-xl text-gray-600 mb-8">欢迎来到我的主页！</p>
            <a href="about.html" class="inline-flex items-center px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition">
                <i class="fa fa-user mr-2"></i> 了解更多关于我
            </a>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-6 px-6">
        <div class="max-w-6xl mx-auto text-center">
            <p>&copy; 2026 杨徵泉的个人主页 | 资源与环境专业</p>
        </div>
    </footer>
</body>
</html>
